name: Refresh content promotion issue

# Keeps the single "Content promotion" issue in sync with templates/*.json.
# Triggers: on template changes, manually, OR when the `refresh` label is added
# to the issue (which is then auto-removed). Uses GITHUB_TOKEN — no PAT.

on:
  push:
    branches: [main]
    paths:
      - 'templates/**.json'
  workflow_dispatch: {}
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  refresh:
    if: >-
      github.event_name != 'issues' ||
      (github.event.label.name == 'refresh' &&
       contains(github.event.issue.labels.*.name, 'content-promotion'))
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TITLE: "Content promotion"
      LABEL: content-promotion
    steps:
      - uses: actions/checkout@v4

      - name: Ensure labels exist
        run: |
          gh label create "$LABEL"  --color 0e8a16 --description "Auto-maintained content promotion checklist" 2>/dev/null || true
          gh label create "promote"   --color d93f0b --description "Promote the checked pages to Production" 2>/dev/null || true
          gh label create "refresh"   --color 1d76db --description "Rebuild the content list (auto-removed)" 2>/dev/null || true
          gh label create "show-diff" --color fbca04 --description "Report which pages differ between Staging and Prod (auto-removed)" 2>/dev/null || true

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Pull page templates from Staging (source of truth for content)
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
        run: |
          mkdir -p ./_stg
          shopify theme pull --theme=${{ secrets.SHOPIFY_STAGING_THEME_ID }} \
            --path ./_stg --nodelete --only 'templates/page*.json'
          echo "Pulled page templates:"
          ls -1 ./_stg/templates 2>/dev/null || echo "(none)"

      - name: Build checklist body (pages on Staging)
        run: node scripts/gen-content-list.mjs --dir ./_stg/templates > body.md

      - name: Upsert the issue
        run: |
          NUM=$(gh issue list --label "$LABEL" --state open --json number -q '.[0].number')
          if [ -z "$NUM" ]; then
            gh issue create --title "$TITLE" --label "$LABEL" --body-file body.md
          else
            gh issue edit "$NUM" --body-file body.md
            echo "Updated issue #$NUM"
          fi

      - name: Remove the refresh label (when triggered by it)
        if: github.event_name == 'issues'
        run: |
          gh issue edit ${{ github.event.issue.number }} --remove-label refresh
          gh issue comment ${{ github.event.issue.number }} --body "🔄 Page list refreshed from \`templates/*.json\`. (All ticks were reset.)"
