name: Create Store Page (Admin API)

# Creates an Online Store Page and (optionally) assigns it a custom theme
# template, via the Admin GraphQL API. Pages are STORE-level (shared by every
# theme) — this does not touch Staging/Prod themes at all, and does not need
# the production-approval gate used for template/code changes.
#
# Requires a SEPARATE secret: SHOPIFY_ADMIN_API_TOKEN (Admin API access token,
# scope write_content + read_content), from a custom app you create yourself.
# The existing SHOPIFY_CLI_THEME_TOKEN (Theme Access) cannot do this — it is
# scoped to theme files only, not store content.
#
# Idempotent: if a page with the given handle already exists, it reports the
# existing page instead of creating a duplicate.

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Page title (required)"
        required: true
      handle:
        description: "URL handle (optional — auto-generated from title if blank)"
        required: false
      template_suffix:
        description: "Custom template suffix, e.g. 'our-recommendation' for templates/page.our-recommendation.json (leave blank for Default page)"
        required: false
      body_html:
        description: "Initial body HTML (optional — leave blank if the page is fully section-built)"
        required: false
      published:
        description: "Publish immediately?"
        type: boolean
        default: true

jobs:
  create-page:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
      SHOPIFY_ADMIN_API_TOKEN: ${{ secrets.SHOPIFY_ADMIN_API_TOKEN }}
      API_VERSION: "2025-10"
    steps:
      - uses: actions/checkout@v4

      - name: Sanity-check the template suffix against git (advisory only)
        if: inputs.template_suffix != ''
        run: |
          f="templates/page.${{ inputs.template_suffix }}.json"
          if [ -f "$f" ]; then
            echo "OK: $f exists in git."
          else
            echo "::warning::$f not found in git. If it isn't on the PUBLISHED (Prod) theme yet, the page will render with the default layout until it is (seed it via theme-seed-pages, then re-run 'gh workflow run content-issue-refresh.yml')."
          fi

      - name: Check for an existing page with this handle
        if: inputs.handle != ''
        run: |
          Q='query($q:String!){ pages(first:1, query:$q){ edges{ node{ id title handle templateSuffix } } } }'
          BODY=$(node -e '
            const q = process.argv[1], handle = process.argv[2];
            console.log(JSON.stringify({ query: q, variables: { q: `handle:${handle}` } }));
          ' "$Q" "${{ inputs.handle }}")
          RESP=$(curl -s -X POST "https://${SHOPIFY_STORE}/admin/api/${API_VERSION}/graphql.json" \
            -H "X-Shopify-Access-Token: ${SHOPIFY_ADMIN_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          echo "$RESP" > existing.json
          EXISTS=$(node -e 'const r=require("./existing.json");console.log((r.data?.pages?.edges||[]).length>0)')
          echo "PAGE_EXISTS=$EXISTS" >> "$GITHUB_ENV"
          if [ "$EXISTS" = "true" ]; then
            echo "::warning::A page with handle '${{ inputs.handle }}' already exists — skipping creation."
            node -e 'const r=require("./existing.json");console.log(JSON.stringify(r.data.pages.edges[0].node, null, 2))'
          fi

      - name: Create the page
        if: env.PAGE_EXISTS != 'true'
        run: |
          BODY=$(node -e '
            const q = `mutation($page: PageCreateInput!) {
              pageCreate(page: $page) {
                page { id title handle templateSuffix isPublished onlineStoreUrl }
                userErrors { field message }
              }
            }`;
            const page = {
              title: process.env.IN_TITLE,
              isPublished: process.env.IN_PUBLISHED === "true",
            };
            if (process.env.IN_HANDLE) page.handle = process.env.IN_HANDLE;
            if (process.env.IN_TEMPLATE) page.templateSuffix = process.env.IN_TEMPLATE;
            if (process.env.IN_BODY) page.body = process.env.IN_BODY;
            console.log(JSON.stringify({ query: q, variables: { page } }));
          ')
          RESP=$(curl -s -X POST "https://${SHOPIFY_STORE}/admin/api/${API_VERSION}/graphql.json" \
            -H "X-Shopify-Access-Token: ${SHOPIFY_ADMIN_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          echo "$RESP" > created.json
          ERRS=$(node -e 'const r=require("./created.json");console.log(JSON.stringify(r.data?.pageCreate?.userErrors||r.errors||[]))')
          if [ "$ERRS" != "[]" ]; then
            echo "::error::pageCreate failed: $ERRS"
            cat created.json
            exit 1
          fi
          node -e 'const r=require("./created.json");const p=r.data.pageCreate.page;console.log(`✅ Created page: ${p.title}\n   handle: ${p.handle}\n   template: ${p.templateSuffix || "(default)"}\n   published: ${p.isPublished}\n   url: ${p.onlineStoreUrl || "(not public - check handle)"}`)'
        env:
          IN_TITLE: ${{ inputs.title }}
          IN_HANDLE: ${{ inputs.handle }}
          IN_TEMPLATE: ${{ inputs.template_suffix }}
          IN_BODY: ${{ inputs.body_html }}
          IN_PUBLISHED: ${{ inputs.published }}

      - name: Next steps
        if: env.PAGE_EXISTS != 'true'
        run: |
          echo "If this page uses sections (custom template), build it in the Staging editor via:"
          echo "  https://\${{ secrets.SHOPIFY_STORE }}/pages/<handle>?view=${{ inputs.template_suffix }}&preview_theme_id=\${{ secrets.SHOPIFY_STAGING_THEME_ID }}"
          echo "Promote the template via the Content promotion issue when ready."
