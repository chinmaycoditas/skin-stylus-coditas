name: Publish Content Patch to Production

# BUTTON 2 — promote up to 5 approved pages to Production in one run.
#
# Source of truth: the Staging theme. Pick pages from the dropdowns
# (page_1..page_5); leave unused slots on "(none)". Only the picked pages are
# pulled from Staging and pushed to Prod. Two jobs:
#   collect  — validates your picks BEFORE the approval gate (typos/empty fail fast)
#   promote  — approval-gated; pulls, snapshots, pushes only the picked pages
