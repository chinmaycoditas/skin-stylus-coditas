jobs:
  collect:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.c.outputs.files }}
      flags: ${{ steps.c.outputs.flags }}
    steps:
      - name: Collect & validate selected pages
        id: c
        env:
          P1: ${{ inputs.page_1 }}
          P2: ${{ inputs.page_2 }}
          P3: ${{ inputs.page_3 }}
          P4: ${{ inputs.page_4 }}
          P5: ${{ inputs.page_5 }}
        run: |
          uniq=()
          declare -A seen
          for v in "$P1" "$P2" "$P3" "$P4" "$P5"; do
            [ -z "$v" ] && continue
            [ "$v" = "(none)" ] && continue
            if [[ ! "$v" =~ ^templates/[A-Za-z0-9._/-]+\.json$ ]]; then
              echo "::error::Invalid selection '$v' — expected a templates/*.json page."
              exit 1
            fi
            if [ -z "${seen[$v]:-}" ]; then seen[$v]=1; uniq+=("$v"); fi
          done
          if [ ${#uniq[@]} -eq 0 ]; then
            echo "::error::No pages selected — set at least one dropdown to a page (not '(none)')."
            exit 1
          fi
          ONLY=""
          for f in "${uniq[@]}"; do ONLY="$ONLY --only $f"; done
          files=$(IFS=,; echo "${uniq[*]}")
          {
            echo "files=$files"
            echo "flags=$ONLY"
          } >> "$GITHUB_OUTPUT"
          echo "Selected ${#uniq[@]} page(s): $files"

  promote:
    needs: collect
    runs-on: ubuntu-latest
    environment: production-approval
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Pull named content from Staging
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
          ONLY_FLAGS: ${{ needs.collect.outputs.flags }}
        run: |
          shopify theme pull --theme=${{ secrets.SHOPIFY_STAGING_THEME_ID }} --nodelete $ONLY_FLAGS

      - name: Snapshot promoted content
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git checkout -B content-snapshots
          git add -A
          git commit -m "Content patch $(date -u +%Y-%m-%dT%H:%M:%SZ): ${{ needs.collect.outputs.files }}" || echo "No changes to snapshot"
          git push origin content-snapshots --force

      - name: Push named content into Production theme
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
          ONLY_FLAGS: ${{ needs.collect.outputs.flags }}
        run: |
          shopify theme push --theme=${{ secrets.SHOPIFY_PROD_THEME_ID }} \
            --allow-live \
            --nodelete \
            $ONLY_FLAGS

      - name: Done
        run: |
          echo "Promoted to Production: ${{ needs.collect.outputs.files }}"
