name: Publish Staging to Production

on:
  workflow_dispatch: {}

jobs:
  pull-staging-snapshot:
    runs-on: ubuntu-latest
    environment: production-approval
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Pull current Staging state (code + content) for audit trail
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
        run: |
          shopify theme pull --theme=${{ secrets.SHOPIFY_STAGING_THEME_ID }}

      - name: Commit snapshot to content-snapshots branch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git checkout -B content-snapshots
          git add -A
          git commit -m "Pre-publish snapshot of Staging theme $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "No changes to snapshot"
          git push origin content-snapshots --force

      - name: Publish Staging to live
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
        run: |
          shopify theme publish --theme=${{ secrets.SHOPIFY_STAGING_THEME_ID }} --force
