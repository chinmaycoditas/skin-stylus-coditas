name: Theme Prune (delete unused files)

# DESTRUCTIVE. Deletes the files in .github/theme-prune-manifest.txt from a
# theme, to reconcile the live theme with the git cleanup (the normal deploy
# runs --nodelete and never deletes).
#
# Uses the Shopify CLI (same auth as the deploys). A scoped `theme push`
# limited to the manifest files, WITHOUT --nodelete, deletes exactly those
# files (they are absent in git) and touches nothing else.
#
# Safety: dry-run first (lists the plan, changes nothing), staging first.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which theme to prune"
        type: choice
        options: [staging, prod]
        default: staging
      mode:
        description: "dry-run = show plan only; delete = actually remove"
        type: choice
        options: [dry-run, delete]
        default: dry-run

jobs:
  prune:
    runs-on: ubuntu-latest
    environment: production-approval
    steps:
      - uses: actions/checkout@v4

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Prune
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
          STAGING_ID: ${{ secrets.SHOPIFY_STAGING_THEME_ID }}
          PROD_ID: ${{ secrets.SHOPIFY_PROD_THEME_ID }}
          TARGET: ${{ inputs.target }}
          MODE: ${{ inputs.mode }}
        run: |
          set -o pipefail
          if [ "$TARGET" = "prod" ]; then THEME="$PROD_ID"; ALLOW="--allow-live"; else THEME="$STAGING_ID"; ALLOW=""; fi
          ONLY=$(sed '/^[[:space:]]*$/d' .github/theme-prune-manifest.txt | sed 's/^/--only /' | tr '\n' ' ')
          COUNT=$(sed '/^[[:space:]]*$/d' .github/theme-prune-manifest.txt | wc -l)
          echo "Target=$TARGET (theme $THEME)  Mode=$MODE  Files=$COUNT"
          echo "-----------------------------------------------------------"
          if [ "$MODE" = "dry-run" ]; then
            echo "DRY-RUN — would delete these from the theme:"
            sed '/^[[:space:]]*$/d' .github/theme-prune-manifest.txt | sed 's/^/  - /'
            echo ""
            echo "Confirming CLI auth / theme access:"
            shopify theme list
            echo "No changes made."
            exit 0
          fi
          echo "DELETING $COUNT files from theme $THEME ..."
          # Scoped push, no --nodelete: deletes the manifest files (absent in git).
          shopify theme push --theme="$THEME" $ALLOW $ONLY 2>&1 | tee push.log
          echo "-----------------------------------------------------------"
          if grep -qiE "with errors|^\s*│\s*error" push.log; then
            echo "::error::Prune push reported errors — see log above."
            exit 1
          fi
          echo "Prune complete on $TARGET."
